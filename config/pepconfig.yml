pep_version: 2.0.0
sample_table: "../test/test_samples.csv" #Change for run
subsample_table: "../test/test_subsamples.csv" #Change for run
sample_modifiers:
  append:
    raw_data_genomes: "test/GTDB" #Change for run
  duplicate:
    sample_type: pangenomes
  derive:
    attributes: [pangenomes]
    sources:
      genome: "{raw_data_genomes}/{pangenome}.ffn"