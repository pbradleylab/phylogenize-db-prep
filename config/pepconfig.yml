pep_version: 2.0.0
sample_table: "../test/test_samples.csv" #Change for run
subsample_table: "../test/test_subsamples.csv" #Change for run
sample_modifiers:
  append:
    pangenome_path: "test/GTDB" #Change for run
  duplicate:
    sample_type: genomes
  derive:
    attributes: [genomes]
    sources:
      ffn: "{pangenome_path}/{pangenome}.ffn"
      centroid: "{pangenome_path}/{pangenome}.txt"